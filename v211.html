<style>

        /* ---- 천공 스테퍼 ---- */
        .stepper-shell {

        .punch-row {

        .punch {

          border-radius: 50%;

        }
        .punch.punched { background: var(--amber-500); }
        .stepper-track {
          height: 4px;

        .blank-input {

        .modal-overlay {

        .modal-box h3 { margin: 0 0 6px; color: var(--indigo-900); }
        .modal-box p { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 14px; }

        .dash-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .dash-title { font-size: 20px; font-weight: 700; color: var(--indigo-900); }
        .dash-count { font-size: 12.5px; color: var(--ink-soft); }
        .sub-card {
          background: #fff; border: 1px solid var(--line); border-radius: 10px;
          margin-bottom: 10px; overflow: hidden;
        }
        .sub-row {
          display: flex; justify-content: space-between; align-items: center;
          padding: 12px 16px; cursor: pointer; gap: 10px; flex-wrap: wrap;
        }
        .sub-row:hover { background: var(--indigo-050); }
        .sub-meta { font-size: 13px; color: var(--ink); }
        .sub-meta b { color: var(--indigo-900); }
        .sub-time { font-size: 11.5px; color: var(--ink-soft); }
        .sub-detail { padding: 4px 18px 16px; border-top: 1px dashed var(--line); }
        .sub-detail .review-section-title { color: var(--indigo-700); }

        @media (max-width: 520px) {
          .cover-grid { grid-template-columns: 1fr; }
          .doc-header { flex-direction: column; gap: 10px; }
        }
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ============================================================
   V-2-1-1_정보보호와정보공유(1).html
   고등학교 공통과목 '정보' (2022개정 교육과정)
   Ⅴ. 디지털 문화 > 2. 정보 보호와 보안 > 2-1 정보 보호와 정보 공유 (1)
   ============================================================ */

/* ---------- 교사 설정값 (필요시 수정) ---------- */
const GRADE_LABEL = "고등학교 1학년"; // 학년 고정 표시
const UNIT_CODE = "V-2-1";
const UNIT_PATH = "Ⅴ. 디지털 문화 > 2. 정보 보호와 보안";
const UNIT_TITLE = "2-1 정보 보호와 정보 공유 (1)";
const TEACHER_CODE = "2026INFO"; // 교사용 확인 코드 (필요시 변경)
const DOC_NO = `INFO-${UNIT_CODE}-2026`;

/* ⚠️ 여기에 배포한 Google Apps Script 웹 앱 URL을 붙여넣으세요. */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcmXYyXc8dUiwaNblyTzXWmBUt5ElMxaNAzFXgvh3Id6wANoXYfPRp_AYa1mBEpcCH/exec";

/* ---------- 문항 그룹 정의 (교과서 222~224쪽 원문 기준) ---------- */
const STEPS = [
  {
    id: "value",
    label: "정보 보호의 가치는 무엇일까?",
    unitTag: "222~223쪽",
    type: "paragraphFill",
    intro: {
      heading: "교과서 222~223쪽 본문을 읽고 빈칸을 채워 보자.",
    },
    lines: [
      {
        template:
          "정보 보호는 불법적 ___과 사용, 공개, 중단, 수정이나 파괴로부터 정보를 ___하는 조치",
        keys: ["b1", "b2"],
        answers: ["접근", "보호"],
      },
      {
        template:
          "디지털 기술을 활용한 서비스가 늘어나면서 ___ 정보의 ___과 ___로 ___, ___, ___, 정보에 대한 ___ 소재의 ___과 같은 문제",
        keys: ["b3", "b4", "b5", "b6", "b7", "b8", "b9", "b10"],
        answers: ["무분별한", "수집", "공유", "개인 정보 침해", "법률 위반", "정보 오남용", "책임", "불분명"],
      },
      {
        sectionTitle: "개인",
        template: "___ (___, ___)",
        keys: ["pi1", "pi1a", "pi1b"],
        answers: ["개인 정보 유출", "신분증", "신용 카드 정보"],
      },
      {
        template:
          "개인 정보 침해, 법률 위반과 개인 정보 오남용, 정보에 대한 책임 소재의 불분명과 같은 문제가 발생하여 개인의 정보 보호가 중요해진다.",
        keys: [],
      },
      {
        sectionTitle: "기업",
        template: "___ (___, ___, ___)",
        keys: ["ci1", "ci1a", "ci1b", "ci1c"],
        answers: ["기업 정보 유출", "영업 비밀", "지적 재산", "전략 계획"],
      },
      {
        template:
          "기업의 금전적 손실, 기업의 신뢰도 하락, 정보에 대한 책임 소재 불분명과 같은 문제가 발생하여 기업의 이익 보호가 중요해진다.",
        keys: [],
      },
      {
        sectionTitle: "국가",
        template: "___ (___, ___, ___)",
        keys: ["ni1", "ni1a", "ni1b", "ni1c"],
        answers: ["국가 정보 유출", "안보 정보", "외교 정보", "군사 기밀 정보"],
      },
      {
        template:
          "경제적 손실, 국가 안보 위협, 정보 오남용, 정보에 대한 책임 소재의 불분명과 같은 문제가 발생하여 국민과 사회 안전 유지가 중요해진다.",
        keys: [],
      },
    ],
  },
  {
    id: "share",
    label: "정보 공유는 왜 필요할까?",
    unitTag: "224쪽",
    type: "paragraphFill",
    intro: {
      heading: "교과서 224쪽의 표를 참고하여 빈칸을 채우고, 정보의 예시도 직접 적어보자.",
    },
    lines: [
      {
        sectionTitle: "보호해야 할 정보",
        template: "보호해야 할 정보 - (___)와 (___)이 있는 (___)은 (___)",
        keys: ["s1", "s2", "s3", "s4"],
        answers: ["개인 정보", "저작권", "저작물", "보호"],
      },
      {
        template:
          "보호해야 할 정보의 예 : ___ , ___ , ___ , ___ , ___",
        keys: ["s5", "s6", "s7", "s8", "s9"],
        answers: ["인적정보", "위치정보", "금융정보", "의료정보", "군사정보"],
        orderIndependent: true,
      },
      {
        sectionTitle: "공유해야 할 정보",
        template: "공유해야 할 정보 - (___)과 (___)의 (___)을 위해",
        keys: ["s10", "s11", "s12"],
        answers: ["개인", "공공", "이익"],
      },
      {
        template:
          "공유해야 할 정보의 예 : ___ , ___ , ___ , ___ , ___ , ___ , ___ , ___ , ___ , ___ , ___",
        keys: ["s13", "s14", "s15", "s16", "s17", "s18", "s19", "s20", "s21", "s22", "s23"],
        answers: ["구인정보", "교통정보", "지역정보", "경제정보", "재난정보", "컴퓨터 바이러스정보", "건강상식", "맛집정보", "여행정보", "해킹정보", "환경정보"],
        orderIndependent: true,
      },
    ],
  },
];

/* ---------- 필드 메타데이터 (검토화면 / 교사용 / CSV 공용) ---------- */
const FIELD_META = {};
STEPS.forEach((step) => {
  if (step.type === "paragraphFill") {
    step.lines.forEach((line, li) => {
      line.keys.forEach((k, ki) => {
        FIELD_META[k] = { section: step.label, label: `빈칸 ${li + 1}-${ki + 1}` };
      });
    });
  }
});
const ALL_FIELD_KEYS = Object.keys(FIELD_META);

/* ---------- 정답 데이터 (교과서 원문 그대로 옮겨야 하는 문항만) ---------- */
const ANSWER_KEY = {};
STEPS.forEach((step) => {
  if (step.type === "paragraphFill") {
    step.lines.forEach((line) => {
      if (line.answers) {
        line.keys.forEach((k, i) => {
          ANSWER_KEY[k] = line.answers[i];
        });
      }
    });
  }
});

/* 공백만 무시하고 나머지는 완전히 일치해야 정답 (교과서 원문 그대로 옮기는 문항용) */
function normalizeForCheck(v) {
  return (v || "").replace(/\s+/g, "").toLowerCase();
}
function isExactMatch(value, correctAnswer) {
  return normalizeForCheck(value) === normalizeForCheck(correctAnswer);
}

/* ---------- 유틸 ---------- */
function todayString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function nowTimeString() {
  const d = new Date();
  return d.toLocaleString("ko-KR", { hour12: false });
}
function blockPaste(e) {
  e.preventDefault();
}
function blockContext(e) {
  e.preventDefault();
}
function csvEscape(v) {
  const s = (v ?? "").toString().replace(/"/g, '""');
  return `"${s}"`;
}

/* ---------- 공통 입력 컴포넌트 ---------- */
function BlankInput({ value, onChange, placeholder, width, correctAnswer, answerPool }) {
  const hasValue = (value || "").trim().length > 0;
  const usesPool = Array.isArray(answerPool);
  const checked = (usesPool ? true : correctAnswer !== undefined) && hasValue;
  const correct =
    checked &&
    (usesPool
      ? answerPool.some((a) => isExactMatch(value, a))
      : isExactMatch(value, correctAnswer));
  const wrong = checked && !correct;
  return (
    <span className="blank-input-wrap">
      <input
        type="text"
        value={value || ""}
        onChange={(e) => onChange(e.target.value)}
        onPaste={blockPaste}
        onCopy={blockPaste}
        onCut={blockPaste}
        onContextMenu={blockContext}
        placeholder={placeholder || ""}
        className={`blank-input ${correct ? "is-correct" : ""} ${wrong ? "is-wrong" : ""}`}
        style={width ? { width } : undefined}
        autoComplete="off"
      />
      {correct && <span className="blank-mark ok">✓</span>}
      {wrong && <span className="blank-mark no">✕</span>}
    </span>
  );
}

/* 문장 속 빈칸(___) 렌더링 */
function FillLine({ template, keys, answers, values, onChange, orderIndependent }) {
  const parts = template.split("___");
  return (
    <p className="fill-line">
      {parts.map((part, i) => (
        <React.Fragment key={i}>
          {part}
          {i < parts.length - 1 && (
            <BlankInput
              value={values[keys[i]]}
              onChange={(v) => onChange(keys[i], v)}
              width="110px"
              correctAnswer={answers ? answers[i] : undefined}
              answerPool={orderIndependent && answers ? answers : undefined}
            />
          )}
        </React.Fragment>
      ))}
    </p>
  );
}

/* ---------- 스텝 진행률 표시 (탑승권/서류 천공 느낌) ---------- */
function Stepper({ current, total }) {
  const items = Array.from({ length: total }, (_, i) => i);
  return (
    <div className="stepper-shell">
      <div className="punch-row">
        {items.map((i) => (
          <span key={i} className={`punch ${i <= current ? "punched" : ""}`} />
        ))}
      </div>
      <div className="stepper-track">
        <div
          className="stepper-fill"
          style={{ width: `${(current / (total - 1)) * 100}%` }}
        />
      </div>
      <div className="stepper-label">
        <span className="step-no">STEP {current + 1}</span>
        <span className="step-total"> / {total}</span>
      </div>
    </div>
  );
}

/* ================================================================== */

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const prefillName = urlParams.get("name") || "";
  const prefillClass = urlParams.get("classNum") || urlParams.get("classNo") || "";
  const prefillNumber = urlParams.get("number") || "";
  const hasFullInfo =
    prefillName.trim() !== "" && prefillClass.trim() !== "" && prefillNumber.trim() !== "";

  const [phase, setPhase] = useState(hasFullInfo ? "form" : "cover"); // cover | form | review | done
  const [stepIndex, setStepIndex] = useState(0);
  const [student, setStudent] = useState({
    classNum: prefillClass,
    number: prefillNumber,
    name: prefillName,
  });
  const [answers, setAnswers] = useState({});
  const [submittedAt, setSubmittedAt] = useState(null);
  const [dateStamp] = useState(todayString());
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  // 교사용
  const [teacherOpen, setTeacherOpen] = useState(false);
  const [teacherAuthed, setTeacherAuthed] = useState(false);
  const [teacherCodeInput, setTeacherCodeInput] = useState("");
  const [teacherError, setTeacherError] = useState("");
  const [submissions, setSubmissions] = useState([]);
  const [loadingSubs, setLoadingSubs] = useState(false);
  const [expanded, setExpanded] = useState({});

  // 전역 우클릭 / 개발자도구 단축키 방지 (가벼운 방해 장치 수준, 완전 차단은 아님)
  useEffect(() => {
    const onContext = (e) => e.preventDefault();
    const onKeyDown = (e) => {
      const key = e.key.toUpperCase();
      const blocked =
        key === "F12" ||
        (e.ctrlKey && e.shiftKey && (key === "I" || key === "J" || key === "C")) ||
        (e.ctrlKey && key === "U");
      if (blocked) e.preventDefault();
    };
    document.addEventListener("contextmenu", onContext);
    document.addEventListener("keydown", onKeyDown);
    return () => {
      document.removeEventListener("contextmenu", onContext);
      document.removeEventListener("keydown", onKeyDown);
    };
  }, []);

  const setAnswer = (key, value) => setAnswers((a) => ({ ...a, [key]: value }));

  const step = STEPS[stepIndex];

  const isStepValid = useMemo(() => {
    if (!step) return false;
    if (step.type === "paragraphFill") {
      return step.lines.every((line) =>
        line.keys.every((k, i) => {
          if (line.answers) return isExactMatch(answers[k], line.answers[i]);
          return (answers[k] || "").trim().length >= 1;
        })
      );
    }
    return false;
  }, [step, answers]);

  const coverValid =
    student.classNum.trim().length > 0 &&
    student.number.trim().length > 0 &&
    student.name.trim().length > 0;

  function goNext() {
    if (stepIndex < STEPS.length - 1) {
      setStepIndex((i) => i + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setPhase("review");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }
  function goPrev() {
    if (stepIndex > 0) {
      setStepIndex((i) => i - 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setPhase("cover");
    }
  }

  async function handleSubmit() {
    setSubmitting(true);
    setSubmitError("");
    try {
      if (!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
        throw new Error("SCRIPT_URL이 설정되지 않았습니다. 파일 상단의 SCRIPT_URL을 확인하세요.");
      }
      const submittedTime = nowTimeString();
      const payload = {
        version: "v211",
        grade: GRADE_LABEL,
        classNum: student.classNum,
        number: student.number,
        name: student.name,
        submittedAt: submittedTime,
        ...answers,
      };
      // Apps Script 프리플라이트(OPTIONS) 회피를 위해 text/plain으로 전송
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "저장 실패");
      setSubmittedAt(submittedTime);
      setPhase("done");
    } catch (e) {
      setSubmitError("제출 중 문제가 발생했습니다. 다시 시도해 주세요. (" + (e.message || e) + ")");
    } finally {
      setSubmitting(false);
    }
  }

  /* ---------- 교사용 데이터 로드 (구글 시트에서 불러오기) ---------- */
  async function loadSubmissions() {
    setLoadingSubs(true);
    try {
      if (!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
        throw new Error("SCRIPT_URL이 설정되지 않았습니다.");
      }
      const res = await fetch(SCRIPT_URL + "?version=v211", { method: "GET" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "불러오기 실패");
      const results = (data.rows || []).sort((a, b) =>
        a["제출시각"] < b["제출시각"] ? 1 : -1
      );
      setSubmissions(results);
    } catch (e) {
      setSubmissions([]);
      setTeacherError("제출 목록을 불러오지 못했습니다. (" + (e.message || e) + ")");
    } finally {
      setLoadingSubs(false);
    }
  }

  function handleTeacherLogin() {
    if (teacherCodeInput.trim() === TEACHER_CODE) {
      setTeacherAuthed(true);
      setTeacherError("");
      loadSubmissions();
    } else {
      setTeacherError("확인 코드가 올바르지 않습니다.");
    }
  }

  function downloadCSV() {
    const headers = [
      "반",
      "번호",
      "이름",
      ...ALL_FIELD_KEYS.map((k) => `${FIELD_META[k].section}_${FIELD_META[k].label}`),
      "제출시각",
    ];
    const rows = submissions.map((s) => {
      const base = [s["반"], s["번호"], s["이름"]];
      const ans = ALL_FIELD_KEYS.map((k) => s[k] || "");
      return [...base, ...ans, s["제출시각"]];
    });
    const csvContent =
      "\uFEFF" +
      [headers, ...rows].map((r) => r.map(csvEscape).join(",")).join("\r\n");
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${UNIT_CODE}_제출목록.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ================= 렌더 ================= */
  return (
    <div className="app-root">

      {/* ================= 학생용 화면 ================= */}
      {phase !== "done" && (
        <div className="doc-shell">
          <div className="doc-header">
            <div>
              <div className="doc-no">문서번호 {DOC_NO}</div>
              <div className="unit-path">{UNIT_PATH}</div>
              <div className="unit-title">{UNIT_TITLE}</div>
            </div>
            <div className="seal">
              <span>정보</span>
              <span className="seal-code">{UNIT_CODE}</span>
            </div>
          </div>

          {phase === "form" && <Stepper current={stepIndex} total={STEPS.length} />}

          <div className={`doc-card ${phase !== "form" ? "last" : ""}`}>
            {phase === "cover" && (
              <div className="cover-card">
                <span className="section-tag">학생 정보 입력</span>
                <div className="cover-title">온라인 학습지</div>
                <div className="cover-sub">
                  아래 정보를 입력한 뒤 학습지를 시작하세요. 답안은 직접 타이핑해야 하며
                  복사/붙여넣기는 지원되지 않습니다.
                </div>
                <div className="cover-grid">
                  <div className="field-box">
                    <label>학년</label>
                    <div className="fixed-box">{GRADE_LABEL}</div>
                  </div>
                  <div className="field-box">
                    <label>반</label>
                    <input
                      value={student.classNum}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, classNum: e.target.value }))
                      }
                      onPaste={blockPaste}
                      onContextMenu={blockContext}
                      placeholder="예: 3"
                    />
                  </div>
                  <div className="field-box">
                    <label>번호</label>
                    <input
                      value={student.number}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, number: e.target.value }))
                      }
                      onPaste={blockPaste}
                      onContextMenu={blockContext}
                      placeholder="예: 12"
                    />
                  </div>
                  <div className="field-box" style={{ gridColumn: "1 / -1" }}>
                    <label>이름</label>
                    <input
                      value={student.name}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, name: e.target.value }))
                      }
                      onPaste={blockPaste}
                      onContextMenu={blockContext}
                      placeholder="이름을 입력하세요"
                    />
                  </div>
                </div>
                <div className="btn-row">
                  <button
                    className="btn btn-primary"
                    disabled={!coverValid}
                    onClick={() => setPhase("form")}
                  >
                    학습지 시작하기 →
                  </button>
                </div>
              </div>
            )}

            {phase === "form" && (
              <StepRenderer step={step} answers={answers} setAnswer={setAnswer} />
            )}

            {phase === "form" && (
              <div className="btn-row">
                <button className="btn btn-ghost" onClick={goPrev}>
                  ← 이전
                </button>
                <button className="btn btn-primary" disabled={!isStepValid} onClick={goNext}>
                  {stepIndex === STEPS.length - 1 ? "검토하기 →" : "다음 →"}
                </button>
              </div>
            )}

            {phase === "review" && (
              <ReviewScreen
                student={student}
                dateStamp={dateStamp}
                answers={answers}
                onEdit={(idx) => {
                  setStepIndex(idx);
                  setPhase("form");
                }}
                onBack={() => {
                  setStepIndex(STEPS.length - 1);
                  setPhase("form");
                }}
                onSubmit={handleSubmit}
                submitting={submitting}
                submitError={submitError}
              />
            )}
          </div>

          {phase !== "review" && (
            <div className="footer-note">
              {UNIT_PATH} · {UNIT_TITLE}
              <br />
              <button className="teacher-link" onClick={() => setTeacherOpen(true)}>
                교사용
              </button>
            </div>
          )}
        </div>
      )}

      {phase === "done" && (
        <div className="doc-shell">
          <div className="doc-header">
            <div>
              <div className="doc-no">문서번호 {DOC_NO}</div>
              <div className="unit-path">{UNIT_PATH}</div>
              <div className="unit-title">{UNIT_TITLE}</div>
            </div>
            <div className="seal">
              <span>정보</span>
              <span className="seal-code">{UNIT_CODE}</span>
            </div>
          </div>
          <div className="doc-card last">
            <div className="done-wrap">
              <div className="done-badge">✓</div>
              <h2 className="serif" style={{ color: "var(--indigo-900)" }}>
                제출 완료
              </h2>
              <p style={{ color: "var(--ink-soft)", fontSize: 14 }}>
                {student.name} 학생의 학습지가 정상적으로 제출되었습니다.
                <br />
                제출 시각 : {submittedAt}
              </p>
            </div>
          </div>
        </div>
      )}

      {/* ================= 교사용 로그인 모달 ================= */}
      {teacherOpen && !teacherAuthed && (
        <div className="modal-overlay" onClick={() => setTeacherOpen(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <h3 className="serif">교사용 확인</h3>
            <p>확인 코드를 입력하면 제출 목록을 볼 수 있습니다.</p>
            {teacherError && <div className="modal-error">{teacherError}</div>}
            <input
              type="password"
              placeholder="확인 코드"
              value={teacherCodeInput}
              onChange={(e) => setTeacherCodeInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleTeacherLogin()}
            />
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setTeacherOpen(false)}>
                취소
              </button>
              <button className="btn btn-primary" onClick={handleTeacherLogin}>
                확인
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ================= 교사용 대시보드 ================= */}
      {teacherOpen && teacherAuthed && (
        <div className="modal-overlay" onClick={() => setTeacherOpen(false)}>
          <div
            className="modal-box"
            style={{ maxWidth: 900, maxHeight: "85vh", overflowY: "auto" }}
            onClick={(e) => e.stopPropagation()}
          >
            <div className="dash-header">
              <div>
                <div className="dash-title serif">제출 목록</div>
                <div className="dash-count">
                  {loadingSubs ? "불러오는 중..." : `총 ${submissions.length}건 제출됨`}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn btn-ghost" onClick={loadSubmissions}>
                  새로고침
                </button>
                <button
                  className="btn btn-amber"
                  onClick={downloadCSV}
                  disabled={submissions.length === 0}
                >
                  CSV 다운로드
                </button>
                <button className="btn btn-ghost" onClick={() => setTeacherOpen(false)}>
                  닫기
                </button>
              </div>
            </div>

            {submissions.length === 0 && !loadingSubs && (
              <p style={{ color: "var(--ink-soft)", fontSize: 13.5 }}>
                아직 제출된 학습지가 없습니다.
              </p>
            )}

            {submissions.map((s, idx) => {
              const key = `${s["반"]}-${s["번호"]}-${s["이름"]}-${idx}`;
              const isOpen = !!expanded[key];
              return (
                <div className="sub-card" key={key}>
                  <div
                    className="sub-row"
                    onClick={() => setExpanded((e) => ({ ...e, [key]: !isOpen }))}
                  >
                    <div className="sub-meta">
                      <b>{s["이름"]}</b> · {s["반"]}반 {s["번호"]}번
                    </div>
                    <div className="sub-time">
                      제출 {s["제출시각"]} {isOpen ? "▲" : "▼"}
                    </div>
                  </div>
                  {isOpen && (
                    <div className="sub-detail">
                      {STEPS.map((st) => {
                        const keys = Object.keys(FIELD_META).filter(
                          (k) => FIELD_META[k].section === st.label
                        );
                        if (keys.length === 0) return null;
                        return (
                          <div className="review-section" key={st.id}>
                            <div className="review-section-title">{st.label}</div>
                            {keys.map((k) => (
                              <div className="review-item" key={k}>
                                <span className="rk">{FIELD_META[k].label} : </span>
                                <span className="rv">
                                  {s[k] || (
                                    <em style={{ color: "#b3432f" }}>미입력</em>
                                  )}
                                </span>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 문항 타입별 렌더러 ---------- */
function StepRenderer({ step, answers, setAnswer }) {
  return (
    <div>
      <span className="section-tag">{step.unitTag}</span>
      <h2 className="section-title">{step.label}</h2>

      {step.intro && (
        <div className="intro-box">
          {step.intro.heading && <span className="heading">{step.intro.heading}</span>}
        </div>
      )}

      {step.type === "paragraphFill" &&
        step.lines.map((line, i) => (
          <React.Fragment key={i}>
            {line.sectionTitle && (
              <p className="fill-section-title">{line.sectionTitle}</p>
            )}
            <FillLine
              template={line.template}
              keys={line.keys}
              answers={line.answers}
              values={answers}
              onChange={setAnswer}
              orderIndependent={line.orderIndependent}
            />
          </React.Fragment>
        ))}
    </div>
  );
}

/* ---------- 검토 화면 ---------- */
function ReviewScreen({
  student,
  dateStamp,
  answers,
  onEdit,
  onBack,
  onSubmit,
  submitting,
  submitError,
}) {
  return (
    <div>
      <span className="section-tag">최종 확인</span>
      <h2 className="section-title">전체 답안 검토</h2>

      <div className="review-section">
        <div className="review-section-title">학생 정보</div>
        <div className="review-item">
          <span className="rk">학년/반/이름 : </span>
          <span className="rv">
            {GRADE_LABEL} {student.classNum}반 {student.number}번 {student.name}
          </span>
        </div>
        <div className="review-item">
          <span className="rk">날짜 : </span>
          <span className="rv">{dateStamp}</span>
        </div>
      </div>

      {STEPS.map((step, idx) => {
        const keys = Object.keys(FIELD_META).filter(
          (k) => FIELD_META[k].section === step.label
        );
        if (keys.length === 0) return null;
        return (
          <div className="review-section" key={step.id}>
            <div className="review-section-title">
              {step.label}
              <button className="link-btn" onClick={() => onEdit(idx)}>
                수정하기
              </button>
            </div>
            {keys.map((k) => (
              <div className="review-item" key={k}>
                <span className="rk">{FIELD_META[k].label} : </span>
                <span className="rv">
                  {(answers[k] || "").trim() || (
                    <em style={{ color: "#b3432f" }}>미입력</em>
                  )}
                </span>
              </div>
            ))}
          </div>
        );
      })}

      {submitError && (
        <div style={{ color: "var(--danger)", fontSize: 13, marginBottom: 10 }}>
          {submitError}
        </div>
      )}

      <div className="btn-row">
        <button className="btn btn-ghost" onClick={onBack}>
          ← 수정하러 가기
        </button>
        <button className="btn btn-primary" disabled={submitting} onClick={onSubmit}>
          {submitting ? "제출 중..." : "제출하기"}
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
