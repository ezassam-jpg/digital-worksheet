<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>학습지 접속</title>
<style>
  :root {
    --ink: #232244;
    --ink-soft: #4A4A6A;
    --mute: #8686A0;
    --amber: #D89A3E;
    --bg: #F5F4F9;
    --line: #E3E1EF;
    --bad: #C24A4A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Apple SD Gothic Neo','Malgun Gothic','Pretendard',system-ui,sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 32px 24px;
  }
  h1 {
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin: 0 0 6px;
    text-align: center;
  }
  p.sub {
    font-size: 13px;
    color: var(--mute);
    margin: 0 0 24px;
    text-align: center;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--mute);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    letter-spacing: 0.05em;
    border: 1px solid var(--line);
    border-radius: 10px;
    outline: none;
    text-align: center;
    color: var(--ink);
  }
  input:focus { border-color: var(--amber); }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    background: var(--ink);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:disabled {
    background: #E4E2EF;
    color: #A6A4BE;
    cursor: not-allowed;
  }
  .err {
    margin-top: 12px;
    font-size: 12px;
    color: var(--bad);
    text-align: center;
    display: none;
  }
  .loading {
    margin-top: 12px;
    font-size: 12px;
    color: var(--mute);
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <h1>학습지 접속</h1>
  <p class="sub">학번을 입력하면 해당 학습지로 이동합니다</p>
  <label for="studentId">학번</label>
  <input id="studentId" type="text" inputmode="numeric" placeholder="예: 1101" maxlength="10" />
  <label for="studentName" style="margin-top:14px;">이름</label>
  <input id="studentName" type="text" placeholder="예: 홍길동" maxlength="10" />
  <button id="goBtn">접속하기</button>
  <p class="err" id="errMsg"></p>
  <p class="loading" id="loadingMsg">확인 중...</p>
</div>

<script>
  /* ⚠️ Google Apps Script 웹 앱 URL을 여기에 붙여넣으세요 (v11.html 등과 동일한 URL) */
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcmXYyXc8dUiwaNblyTzXWmBUt5ElMxaNAzFXgvh3Id6wANoXYfPRp_AYa1mBEpcCH/exec";

  const input = document.getElementById("studentId");
  const nameInput = document.getElementById("studentName");
  const btn = document.getElementById("goBtn");
  const errMsg = document.getElementById("errMsg");
  const loadingMsg = document.getElementById("loadingMsg");

  async function go() {
    const id = input.value.trim();
    const name = nameInput.value.trim();
    errMsg.style.display = "none";
    if (!id) return;

    if (!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
      errMsg.textContent = "SCRIPT_URL이 설정되지 않았습니다.";
      errMsg.style.display = "block";
      return;
    }

    btn.disabled = true;
    loadingMsg.style.display = "block";
    try {
      const res = await fetch(`${SCRIPT_URL}?action=lookup&studentId=${encodeURIComponent(id)}`);
      const data = await res.json();
      if (!data.ok) {
        errMsg.textContent = data.error || "등록되지 않은 학번입니다. 선생님께 문의하세요.";
        errMsg.style.display = "block";
      } else {
        // data.file 예: "v11", "V11", "v11.html" 등 - 소문자로 통일
        let file = data.file.trim().toLowerCase();
        if (!file.endsWith(".html")) file += ".html";

        // 학번 4자리(예: 1101)에서 반/번호 자동 추출: 1자리(학년)+1자리(반)+2자리(번호)
        const params = new URLSearchParams();
        if (name) params.set("name", name);
        if (/^\d{4}$/.test(id)) {
          const classNum = id.charAt(1);
          const number = String(parseInt(id.slice(2), 10));
          params.set("classNum", classNum);
          params.set("number", number);
        }
        window.location.href = params.toString() ? `${file}?${params.toString()}` : file;
        return;
      }
    } catch (e) {
      errMsg.textContent = "접속 중 오류가 발생했어요. 다시 시도해주세요.";
      errMsg.style.display = "block";
    }
    btn.disabled = false;
    loadingMsg.style.display = "none";
  }

  btn.addEventListener("click", go);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
</script>
</body>
</html>
