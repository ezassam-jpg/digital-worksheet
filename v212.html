/* ---------- 필드 메타데이터 (검토화면 / 교사용 / CSV 공용) ---------- */
const FIELD_META = {};
STEPS.forEach((step) => {
  if (step.type === "paragraphFill") {
    step.lines.forEach((line, li) => {
      line.keys.forEach((k, ki) => {
        FIELD_META[k] = { section: step.label, label: `빈칸 ${li + 1}-${ki + 1}` };
      });
    });
  } else if (step.type === "freeText") {
    step.fields.forEach((f) => {
      FIELD_META[f.key] = { section: step.label, label: f.label };
    });
  }
});
const ALL_FIELD_KEYS = Object.keys(FIELD_META);

/* ---------- 정답 데이터 (교과서 원문 그대로 옮겨야 하는 문항만) ---------- */
const ANSWER_KEY = {};
STEPS.forEach((step) => {
  if (step.type === "paragraphFill") {
    step.lines.forEach((line) => {
      if (line.answers) {
        line.keys.forEach((k, i) => {
          ANSWER_KEY[k] = line.answers[i];
        });
      }
    });
  }
});

/* 공백만 무시하고 나머지는 완전히 일치해야 정답 (교과서 원문 그대로 옮기는 문항용) */
function normalizeForCheck(v) {
  return (v || "").replace(/\s+/g, "").toLowerCase();
}
function isExactMatch(value, correctAnswer) {
  return normalizeForCheck(value) === normalizeForCheck(correctAnswer);
}

/* ---------- 유틸 ---------- */
function todayString() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function nowTimeString() {
  const d = new Date();
  return d.toLocaleString("ko-KR", { hour12: false });
}
function blockPaste(e) {
  e.preventDefault();
}
function blockContext(e) {
  e.preventDefault();
}
function csvEscape(v) {
  const s = (v ?? "").toString().replace(/"/g, '""');
  return `"${s}"`;
}

/* ---------- 공통 입력 컴포넌트 ---------- */
function BlankInput({ value, onChange, placeholder, width, correctAnswer, answerPool }) {
  const hasValue = (value || "").trim().length > 0;
  const usesPool = Array.isArray(answerPool);
  const checked = (usesPool ? true : correctAnswer !== undefined) && hasValue;
  const correct =
    checked &&
    (usesPool
      ? answerPool.some((a) => isExactMatch(value, a))
      : isExactMatch(value, correctAnswer));
  const wrong = checked && !correct;
  return (
    <span className="blank-input-wrap">
      <input
        type="text"
        value={value || ""}
        onChange={(e) => onChange(e.target.value)}
        onPaste={blockPaste}
        onCopy={blockPaste}
        onCut={blockPaste}
        onContextMenu={blockContext}
        placeholder={placeholder || ""}
        className={`blank-input ${correct ? "is-correct" : ""} ${wrong ? "is-wrong" : ""}`}
        style={width ? { width } : undefined}
        autoComplete="off"
      />
      {correct && <span className="blank-mark ok">✓</span>}
      {wrong && <span className="blank-mark no">✕</span>}
    </span>
  );
}

/* 문장 속 빈칸(___) 렌더링 */
function FillLine({ template, keys, answers, values, onChange, orderIndependent }) {
  const parts = template.split("___");
  return (
    <p className="fill-line">
      {parts.map((part, i) => (
        <React.Fragment key={i}>
          {part}
          {i < parts.length - 1 && (
            <BlankInput
              value={values[keys[i]]}
              onChange={(v) => onChange(keys[i], v)}
              width="110px"
              correctAnswer={answers ? answers[i] : undefined}
              answerPool={orderIndependent && answers ? answers : undefined}
            />
          )}
        </React.Fragment>
      ))}
    </p>
  );
}

/* 정답 체크 없는 자유 서술형 입력 (기사 읽고 서술하기 등) */
function FreeTextField({ field, value, onChange }) {
  const len = (value || "").trim().length;
  const min = field.minLength || 1;
  const ok = len >= min;
  return (
    <div className="q-block">
      <div className="q-prompt">{field.label}</div>
      <div className="answer-wrap">
        <textarea
          className="answer-textarea"
          rows={field.rows || 3}
          value={value || ""}
          onChange={(e) => onChange(e.target.value)}
          onPaste={blockPaste}
          onCopy={blockPaste}
          onCut={blockPaste}
          onContextMenu={blockContext}
          placeholder={field.placeholder || ""}
        />
      </div>
      <div className={`char-count ${ok ? "ok" : ""}`}>
        {len}자 입력 (최소 {min}자)
      </div>
    </div>
  );
}

/* ---------- 스텝 진행률 표시 (탑승권/서류 천공 느낌) ---------- */
function Stepper({ current, total }) {
  const items = Array.from({ length: total }, (_, i) => i);
  return (
    <div className="stepper-shell">
      <div className="punch-row">
        {items.map((i) => (
          <span key={i} className={`punch ${i <= current ? "punched" : ""}`} />
        ))}
      </div>
      <div className="stepper-track">
        <div
          className="stepper-fill"
          style={{ width: `${(current / (total - 1)) * 100}%` }}
        />
      </div>
      <div className="stepper-label">
        <span className="step-no">STEP {current + 1}</span>
        <span className="step-total"> / {total}</span>
      </div>
    </div>
  );
}

function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const prefillName = urlParams.get("name") || "";
  const prefillClass = urlParams.get("classNum") || urlParams.get("classNo") || "";
  const prefillNumber = urlParams.get("number") || "";
  const hasFullInfo =
    prefillName.trim() !== "" && prefillClass.trim() !== "" && prefillNumber.trim() !== "";

  const [phase, setPhase] = useState(hasFullInfo ? "form" : "cover"); // cover | form | review | done
  const [stepIndex, setStepIndex] = useState(0);
  const [student, setStudent] = useState({
    classNum: prefillClass,
    number: prefillNumber,
    name: prefillName,
  });
  const [answers, setAnswers] = useState({});
  const [submittedAt, setSubmittedAt] = useState(null);
  const [dateStamp] = useState(todayString());
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  // 교사용
  const [teacherOpen, setTeacherOpen] = useState(false);
  const [teacherAuthed, setTeacherAuthed] = useState(false);
  const [teacherCodeInput, setTeacherCodeInput] = useState("");
  const [teacherError, setTeacherError] = useState("");
  const [submissions, setSubmissions] = useState([]);
  const [loadingSubs, setLoadingSubs] = useState(false);
  const [expanded, setExpanded] = useState({});

  // 전역 우클릭 / 개발자도구 단축키 방지 (가벼운 방해 장치 수준, 완전 차단은 아님)
  useEffect(() => {
    const onContext = (e) => e.preventDefault();
    const onKeyDown = (e) => {
      const key = e.key.toUpperCase();
      const blocked =
        key === "F12" ||
        (e.ctrlKey && e.shiftKey && (key === "I" || key === "J" || key === "C")) ||
        (e.ctrlKey && key === "U");
      if (blocked) e.preventDefault();
    };
    document.addEventListener("contextmenu", onContext);
    document.addEventListener("keydown", onKeyDown);
    return () => {
      document.removeEventListener("contextmenu", onContext);
      document.removeEventListener("keydown", onKeyDown);
    };
  }, []);

  const setAnswer = (key, value) => setAnswers((a) => ({ ...a, [key]: value }));

  const step = STEPS[stepIndex];

  const isStepValid = useMemo(() => {
    if (!step) return false;
    if (step.type === "paragraphFill") {
      return step.lines.every((line) => {
        if (line.orderIndependent && line.answers) {
          return line.keys.every((k) =>
            line.answers.some((a) => isExactMatch(answers[k], a))
          );
        }
        return line.keys.every((k, i) => {
          if (line.answers) return isExactMatch(answers[k], line.answers[i]);
          return (answers[k] || "").trim().length >= 1;
        });
      });
    }
    if (step.type === "freeText") {
      return step.fields.every(
        (f) => (answers[f.key] || "").trim().length >= (f.minLength || 1)
      );
    }
    return false;
  }, [step, answers]);

  const coverValid =
    student.classNum.trim().length > 0 &&
    student.number.trim().length > 0 &&
    student.name.trim().length > 0;

  function goNext() {
    if (stepIndex < STEPS.length - 1) {
      setStepIndex((i) => i + 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setPhase("review");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  }
  function goPrev() {
    if (stepIndex > 0) {
      setStepIndex((i) => i - 1);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      setPhase("cover");
    }
  }

  async function handleSubmit() {
    setSubmitting(true);
    setSubmitError("");
    try {
      if (!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
        throw new Error("SCRIPT_URL이 설정되지 않았습니다. 파일 상단의 SCRIPT_URL을 확인하세요.");
      }
      const submittedTime = nowTimeString();
      const payload = {
        version: "v212",
        grade: GRADE_LABEL,
        classNum: student.classNum,
        number: student.number,
        name: student.name,
        submittedAt: submittedTime,
        ...answers,
      };
      // Apps Script 프리플라이트(OPTIONS) 회피를 위해 text/plain으로 전송
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "저장 실패");
      setSubmittedAt(submittedTime);
      setPhase("done");
    } catch (e) {
      setSubmitError("제출 중 문제가 발생했습니다. 다시 시도해 주세요. (" + (e.message || e) + ")");
    } finally {
      setSubmitting(false);
    }
  }

  /* ---------- 교사용 데이터 로드 (구글 시트에서 불러오기) ---------- */
  async function loadSubmissions() {
    setLoadingSubs(true);
    try {
      if (!SCRIPT_URL || SCRIPT_URL.includes("여기에")) {
        throw new Error("SCRIPT_URL이 설정되지 않았습니다.");
      }
      const res = await fetch(SCRIPT_URL + "?version=v212", { method: "GET" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "불러오기 실패");
      const results = (data.rows || []).sort((a, b) =>
        a["제출시각"] < b["제출시각"] ? 1 : -1
      );
      setSubmissions(results);
    } catch (e) {
      setSubmissions([]);
      setTeacherError("제출 목록을 불러오지 못했습니다. (" + (e.message || e) + ")");
    } finally {
      setLoadingSubs(false);
    }
  }

  function handleTeacherLogin() {
    if (teacherCodeInput.trim() === TEACHER_CODE) {
      setTeacherAuthed(true);
      setTeacherError("");
      loadSubmissions();
    } else {
      setTeacherError("확인 코드가 올바르지 않습니다.");
    }
  }

  function downloadCSV() {
    const headers = [
      "반",
      "번호",
      "이름",
      ...ALL_FIELD_KEYS.map((k) => `${FIELD_META[k].section}_${FIELD_META[k].label}`),
      "제출시각",
    ];
    const rows = submissions.map((s) => {
      const base = [s["반"], s["번호"], s["이름"]];
      const ans = ALL_FIELD_KEYS.map((k) => s[k] || "");
      return [...base, ...ans, s["제출시각"]];
    });
    const csvContent =
      "\uFEFF" +
      [headers, ...rows].map((r) => r.map(csvEscape).join(",")).join("\r\n");
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${UNIT_CODE}-2_제출목록.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ================= 렌더 ================= */
  return (
    <div className="app-root">

      {/* ================= 학생용 화면 ================= */}
      {phase !== "done" && (
        <div className="doc-shell">
          <div className="doc-header">
            <div>
              <div className="doc-no">문서번호 {DOC_NO}</div>
              <div className="unit-path">{UNIT_PATH}</div>
              <div className="unit-title">{UNIT_TITLE}</div>
            </div>
            <div className="seal">
              <span>정보</span>
              <span className="seal-code">{UNIT_CODE}</span>
            </div>
          </div>

          {phase === "form" && <Stepper current={stepIndex} total={STEPS.length} />}

          <div className={`doc-card ${phase !== "form" ? "last" : ""}`}>
            {phase === "cover" && (
              <div className="cover-card">
                <span className="section-tag">학생 정보 입력</span>
                <div className="cover-title">온라인 학습지</div>
                <div className="cover-sub">
                  아래 정보를 입력한 뒤 학습지를 시작하세요. 답안은 직접 타이핑해야 하며
                  복사/붙여넣기는 지원되지 않습니다.
                </div>
                <div className="cover-grid">
                  <div className="field-box">
                    <label>학년</label>
                    <div className="fixed-box">{GRADE_LABEL}</div>
                  </div>
                  <div className="field-box">
                    <label>반</label>
                    <input
                      value={student.classNum}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, classNum: e.target.value }))
                      }
                      onPaste={blockPaste}
                      onContextMenu={blockContext}
                      placeholder="예: 3"
                    />
                  </div>
                  <div className="field-box">
                    <label>번호</label>
                    <input
                      value={student.number}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, number: e.target.value }))
                      }
                      onPaste={blockPaste}
                      onContextMenu={blockContext}
                      placeholder="예: 12"
                    />
                  </div>
                  <div className="field-box" style={{ gridColumn: "1 / -1" }}>
                    <label>이름</label>
                    <input
                      value={student.name}
                      onChange={(e) =>
                        setStudent((s) => ({ ...s, name: e.target.value }))
                      }

                      onContextMenu={blockContext}

                </div>
                <div className="btn-row">

            {phase === "review" && (
              <ReviewScreen
                student={student}
                dateStamp={dateStamp}

            <div className="done-wrap">
              <div className="done-badge">✓</div>
              <h2 className="serif" style={{ color: "var(--indigo-900)" }}>
                제출 완료
              </h2>
              <p style={{ color: "var(--ink-soft)", fontSize: 14 }}>
                {student.name} 학생의 학습지가 정상적으로 제출되었습니다.
                <br />
                제출 시각 : {submittedAt}
              </p>
            </div>
          </div>
        </div>
      )}

      {/* ================= 교사용 로그인 모달 ================= */}
      {teacherOpen && !teacherAuthed && (
        <div className="modal-overlay" onClick={() => setTeacherOpen(false)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <h3 className="serif">교사용 확인</h3>
            <p>확인 코드를 입력하면 제출 목록을 볼 수 있습니다.</p>
            {teacherError && <div className="modal-error">{teacherError}</div>}
            <input
              type="password"
              placeholder="확인 코드"
              value={teacherCodeInput}
              onChange={(e) => setTeacherCodeInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && handleTeacherLogin()}
            />
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={() => setTeacherOpen(false)}>
                취소
              </button>
              <button className="btn btn-primary" onClick={handleTeacherLogin}>
                확인
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ================= 교사용 대시보드 ================= */}
      {teacherOpen && teacherAuthed && (
        <div className="modal-overlay" onClick={() => setTeacherOpen(false)}>
          <div
            className="modal-box"
            style={{ maxWidth: 900, maxHeight: "85vh", overflowY: "auto" }}
            onClick={(e) => e.stopPropagation()}
          >
            <div className="dash-header">
              <div>
                <div className="dash-title serif">제출 목록</div>
                <div className="dash-count">
                  {loadingSubs ? "불러오는 중..." : `총 ${submissions.length}건 제출됨`}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn btn-ghost" onClick={loadSubmissions}>
                  새로고침
                </button>
                <button
                  className="btn btn-amber"
                  onClick={downloadCSV}
                  disabled={submissions.length === 0}
                >
                  CSV 다운로드
                </button>
                <button className="btn btn-ghost" onClick={() => setTeacherOpen(false)}>
                  닫기
                </button>
              </div>
            </div>

            {submissions.length === 0 && !loadingSubs && (
              <p style={{ color: "var(--ink-soft)", fontSize: 13.5 }}>
                아직 제출된 학습지가 없습니다.
              </p>
            )}

            {submissions.map((s, idx) => {
              const key = `${s["반"]}-${s["번호"]}-${s["이름"]}-${idx}`;
              const isOpen = !!expanded[key];
              return (
                <div className="sub-card" key={key}>
                  <div
                    className="sub-row"
                    onClick={() => setExpanded((e) => ({ ...e, [key]: !isOpen }))}
                  >
                    <div className="sub-meta">
                      <b>{s["이름"]}</b> · {s["반"]}반 {s["번호"]}번
                    </div>
                    <div className="sub-time">
                      제출 {s["제출시각"]} {isOpen ? "▲" : "▼"}
                    </div>
                  </div>
                  {isOpen && (
                    <div className="sub-detail">
                      {STEPS.map((st) => {
                        const keys = Object.keys(FIELD_META).filter(
                          (k) => FIELD_META[k].section === st.label
                        );
                        if (keys.length === 0) return null;
                        return (
                          <div className="review-section" key={st.id}>
                            <div className="review-section-title">{st.label}</div>
                            {keys.map((k) => (
                              <div className="review-item" key={k}>
                                <span className="rk">{FIELD_META[k].label} : </span>
                                <span className="rv">
                                  {s[k] || (
                                    <em style={{ color: "#b3432f" }}>미입력</em>
                                  )}
                                </span>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- 문항 타입별 렌더러 ---------- */
function StepRenderer({ step, answers, setAnswer }) {
  return (
    <div>
      <span className="section-tag">{step.unitTag}</span>
      <h2 className="section-title">{step.label}</h2>

      {step.intro && (
        <div className="intro-box">
          {step.intro.heading && <span className="heading">{step.intro.heading}</span>}
        </div>
      )}

      {step.type === "paragraphFill" &&
        step.lines.map((line, i) => (
          <React.Fragment key={i}>
            {line.sectionTitle && (
              <p className="fill-section-title">{line.sectionTitle}</p>
            )}
            <FillLine
              template={line.template}
              keys={line.keys}
              answers={line.answers}
              values={answers}
              onChange={setAnswer}
              orderIndependent={line.orderIndependent}
            />
          </React.Fragment>
        ))}

      {step.type === "freeText" && (
        <>
          {step.article && (
            <div className="article-box">
              <div className="art-title">{step.article.title}</div>
              {step.article.paragraphs.map((p, i) => (
                <p key={i}>{p}</p>
              ))}
              <div className="art-source">{step.article.source}</div>
            </div>
          )}
          {step.fields.map((f) => (
            <FreeTextField
              key={f.key}
              field={f}
              value={answers[f.key]}
              onChange={(v) => setAnswer(f.key, v)}
            />
          ))}
        </>
      )}
    </div>
  );
}

/* ---------- 검토 화면 ---------- */
function ReviewScreen({
  student,
  dateStamp,
  answers,
  onEdit,
  onBack,
  onSubmit,
  submitting,
  submitError,
}) {
  return (
    <div>
      <span className="section-tag">최종 확인</span>
      <h2 className="section-title">전체 답안 검토</h2>

      <div className="review-section">
        <div className="review-section-title">학생 정보</div>
        <div className="review-item">
          <span className="rk">학년/반/이름 : </span>
          <span className="rv">
            {GRADE_LABEL} {student.classNum}반 {student.number}번 {student.name}
          </span>
        </div>
        <div className="review-item">
          <span className="rk">날짜 : </span>
          <span className="rv">{dateStamp}</span>
        </div>
      </div>

      {STEPS.map((step, idx) => {
        const keys = Object.keys(FIELD_META).filter(
          (k) => FIELD_META[k].section === step.label
        );
        if (keys.length === 0) return null;
        return (
          <div className="review-section" key={step.id}>
            <div className="review-section-title">
              {step.label}
              <button className="link-btn" onClick={() => onEdit(idx)}>
                수정하기
              </button>
            </div>
            {keys.map((k) => (
              <div className="review-item" key={k}>
                <span className="rk">{FIELD_META[k].label} : </span>
                <span className="rv">
                  {(answers[k] || "").trim() || (
                    <em style={{ color: "#b3432f" }}>미입력</em>
                  )}
                </span>
              </div>
            ))}
          </div>
        );
      })}

      {submitError && (
        <div style={{ color: "var(--danger)", fontSize: 13, marginBottom: 10 }}>
          {submitError}
        </div>
      )}

      <div className="btn-row">
        <button className="btn btn-ghost" onClick={onBack}>
          ← 수정하러 가기
        </button>
        <button className="btn btn-primary" disabled={submitting} onClick={onSubmit}>
          {submitting ? "제출 중..." : "제출하기"}
        </button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
