<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>디지털 문화 학습지</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');

  :root {
    --indigo-900: #1b1f4b;
    --indigo-800: #232a63;
    --indigo-700: #2c3577;
    --indigo-100: #e8e9f6;
    --indigo-050: #f3f3fb;
    --amber-600: #b4841a;
    --amber-500: #d4a72c;
    --amber-100: #fbf0d2;
    --paper: #faf9f5;
    --ink: #22242f;
    --ink-soft: #565b72;
    --line: #d9dbe8;
    --danger: #b3432f;
    --good: #3a7a4e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; }
  .app-root {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    background-image: radial-gradient(circle at 1px 1px, rgba(27,31,75,0.06) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    min-height: 100vh;
    padding: 28px 16px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1, h2, h3, .serif { font-family: 'Noto Serif KR', serif; }

  .doc-shell { width: 100%; max-width: 720px; }

  .doc-header {
    background: var(--indigo-900);
    color: #fff;
    border-radius: 14px 14px 0 0;
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .doc-header::after {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(212,167,44,0.15);
  }
  .doc-header .doc-no { font-size: 11px; letter-spacing: 0.06em; color: var(--amber-100); opacity: 0.85; }
  .doc-header .unit-path { font-size: 12px; color: #cfd2ee; margin-top: 6px; }
  .doc-header .unit-title { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .seal {
    width: 58px; height: 58px; border-radius: 50%;
    border: 2px solid var(--amber-500);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    color: var(--amber-100); font-size: 11px; font-weight: 700;
    transform: rotate(-8deg); flex-shrink: 0; z-index: 1;
  }
  .seal .seal-code { font-size: 13px; font-family: 'Noto Serif KR', serif; }

  .stepper-shell { background: var(--indigo-800); padding: 14px 24px 18px; color: #fff; }
  .punch-row { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
  .punch { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .punch.punched { background: var(--amber-500); }
  .stepper-track { height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
  .stepper-fill { height: 100%; background: var(--amber-500); transition: width 0.3s ease; }
  .stepper-label { margin-top: 8px; font-size: 12px; letter-spacing: 0.04em; color: var(--amber-100); }
  .step-no { font-weight: 700; }

  .doc-card {
    background: #fff; border: 1px solid var(--line); border-top: none;
    padding: 26px 24px 30px; box-shadow: 0 12px 30px rgba(27,31,75,0.06);
  }
  .doc-card.last { border-radius: 0 0 14px 14px; }

  .section-tag {
    display: inline-block; font-size: 11px; background: var(--indigo-100); color: var(--indigo-700);
    padding: 3px 10px; border-radius: 3px; font-weight: 600; letter-spacing: 0.03em; margin-bottom: 10px;
  }
  .section-title {
    font-size: 19px; font-weight: 700; margin: 0 0 14px; color: var(--indigo-900);
    border-bottom: 2px solid var(--indigo-900); padding-bottom: 10px;
  }

  .q-block { margin-bottom: 20px; }
  .q-block:last-child { margin-bottom: 0; }
  .q-prompt { font-size: 14.5px; font-weight: 600; margin-bottom: 8px; color: var(--ink); display: flex; justify-content: space-between; align-items: center; }
  .q-status { font-size: 12px; color: var(--danger); }
  .q-status.ok { color: var(--good); }

  .answer-wrap { position: relative; }
  .answer-textarea, .answer-input {
    width: 100%; border: 1.5px solid var(--line); border-radius: 8px; padding: 12px 14px;
    font-size: 14px; font-family: inherit; resize: vertical; background: #fffdf8;
    transition: border-color 0.2s;
  }
  .answer-textarea:focus, .answer-input:focus { outline: none; border-color: var(--indigo-700); }
  .char-count { text-align: right; font-size: 11.5px; color: var(--danger); margin-top: 4px; }
  .char-count.ok { color: var(--good); }

  .cover-card { text-align: left; }
  .cover-title { font-size: 26px; font-weight: 700; color: var(--indigo-900); margin: 4px 0 2px; }
  .cover-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 22px; }
  .cover-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .field-box label { display: block; font-size: 12px; font-weight: 700; color: var(--indigo-700); margin-bottom: 6px; letter-spacing: 0.02em; }
  .field-box input, .field-box .fixed-box {
    width: 100%; border: 1.5px solid var(--line); border-radius: 8px; padding: 11px 12px;
    font-size: 14px; font-family: inherit;
  }
  .field-box .fixed-box { background: #eceef2; color: #6b7080; }
  .field-box input:focus { outline: none; border-color: var(--indigo-700); }

  .btn-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 26px; }
  .btn { font-family: inherit; font-size: 14.5px; font-weight: 700; padding: 12px 22px; border-radius: 8px; border: none; cursor: pointer; transition: transform 0.15s, opacity 0.15s; }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--indigo-900); color: #fff; margin-left: auto; }
  .btn-primary:disabled { background: #b9bcd1; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--indigo-700); border: 1.5px solid var(--indigo-100); }

  .review-section { margin-bottom: 18px; border-bottom: 1px dashed var(--line); padding-bottom: 14px; }
  .review-section:last-child { border-bottom: none; }
  .review-section-title { font-size: 13px; font-weight: 700; color: var(--indigo-700); margin-bottom: 8px; }
  .review-item { font-size: 13.5px; margin-bottom: 6px; }
  .review-item .rk { color: var(--ink-soft); }
  .review-item .rv { color: var(--ink); font-weight: 500; white-space: pre-wrap; }

  .done-wrap { text-align: center; padding: 50px 20px; }
  .done-badge {
    width: 84px; height: 84px; border-radius: 50%; background: var(--indigo-900); color: var(--amber-100);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 36px;
  }
  .footer-note { margin-top: 22px; text-align: center; font-size: 11.5px; color: #9599ad; }

  @media (max-width: 520px) {
    .cover-grid { grid-template-columns: 1fr; }
    .doc-header { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

/* ⚠️ Google Apps Script 웹 앱 URL */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcmXYyXc8dUiwaNblyTzXWmBUt5ElMxaNAzFXgvh3Id6wANoXYfPRp_AYa1mBEpcCH/exec";
const VERSION = "v11";

/* ---------------- 문서 헤더 정보 ---------------- */
const UNIT_PATH = "Ⅴ. 디지털 문화 > 1. 디지털 기술과 사회 변화";
const UNIT_TITLE = "디지털 기술의 영향";
const UNIT_CODE = "V-1-1";
const DOC_NO = `INFO-${UNIT_CODE}-2026`;

/* ---------------- 문항 정의 ---------------- */
const STEPS = [
  { id: "cover", kind: "cover" },
  {
    id: "activity1", kind: "field", badge: "지식·이해", no: "01",
    title: "디지털 기술의 발전에 따라 변화한 사회 모습을 한 가지 찾아 적어보자.",
    fields: [
      { key: "past", label: "과거", type: "textarea", placeholder: "예) 사람이 직접 축사 내 기온, 습도 등을 정기적으로 확인하고 돼지의 건강 상태를 살펴 필요한 조치를 하였다.", minLength: 8 },
      { key: "present", label: "현재", type: "textarea", placeholder: "예) 축사 내에 설치한 센서로 실시간 기온, 습도를 파악하고, 인공지능 기술로 돼지의 건강 상태를 살펴볼 수 있다.", minLength: 8 },
    ],
  },
  {
    id: "activity2-1", kind: "field", badge: "과정·기능", no: "02",
    title: "내가 희망하는 학과를 생각해 보고, 해당 학과에서 배우는 내용을 조사한 후, 그와 관련해 디지털 기술과 융합할 미래 사회의 모습을 상상해 보자.",
    fields: [ { key: "major", label: "진로 희망 학과", type: "text", placeholder: "예) 컴퓨터공학과", minLength: 2 } ],
  },
  {
    id: "activity2-2", kind: "field", badge: "과정·기능", no: "02",
    title: "희망 학과에서 배우는 내용을 조사해 적어보자.",
    fields: [ { key: "majorContent", label: "희망 학과에서 배우는 내용", type: "textarea", placeholder: "조사한 내용을 정리해서 적어보세요.", minLength: 10 } ],
  },
  {
    id: "activity2-3", kind: "field", badge: "과정·기능", no: "02",
    title: "디지털 기술과 융합한 미래 사회의 모습을 상상해 적어보자.",
    fields: [ { key: "futureVision", label: "디지털 기술과 융합한 미래 사회의 모습", type: "textarea", placeholder: "상상한 내용을 자유롭게 적어보세요.", minLength: 10 } ],
  },
  {
    id: "activity3", kind: "field", badge: "과정·기능", no: "03",
    title: "디지털 기술의 발전에 따라 새롭게 생겨난 직업을 한 가지만 조사해 적어보자.",
    fields: [
      { key: "jobName", label: "직업명", type: "text", placeholder: "예) 데이터 라벨러", minLength: 2 },
      { key: "jobDesc", label: "하는 일", type: "textarea", placeholder: "이 직업이 실제로 하는 일을 적어보세요.", minLength: 5 },
      { key: "jobTrait", label: "필요한 적성 또는 흥미", type: "textarea", placeholder: "이 직업에 필요한 적성이나 흥미를 적어보세요.", minLength: 5 },
    ],
  },
  /* ✅ 정답이 정해진 문항 예시: type:"answer", correctAnswers:[...] */
  { id: "review", kind: "review" },
  { id: "done", kind: "done" },
];

const FIELD_ORDER = ["past", "present", "major", "majorContent", "futureVision", "jobName", "jobDesc", "jobTrait"];
const FIELD_LABELS = {
  past: "과거 사례", present: "현재 사례", major: "진로 희망 학과",
  majorContent: "희망 학과에서 배우는 내용", futureVision: "디지털 기술과 융합한 미래 사회의 모습",
  jobName: "직업명", jobDesc: "하는 일", jobTrait: "필요한 적성 또는 흥미",
};

function noPaste(e) { e.preventDefault(); }
function isAnswerField(f) { return f.type === "answer"; }
function checkAnswer(f, val) {
  if (!f.correctAnswers) return true;
  const norm = (s) => String(s || "").trim().replace(/\s+/g, "");
  return f.correctAnswers.some((c) => norm(c) === norm(val));
}

/* ---------------- 진행 스테퍼 (천공 스타일) ---------------- */
function Stepper({ current, total }) {
  const items = Array.from({ length: total }, (_, i) => i);
  return (
    <div className="stepper-shell">
      <div className="punch-row">
        {items.map((i) => <span key={i} className={`punch ${i <= current ? "punched" : ""}`} />)}
      </div>
      <div className="stepper-track">
        <div className="stepper-fill" style={{ width: `${total > 1 ? (current / (total - 1)) * 100 : 100}%` }} />
      </div>
      <div className="stepper-label">
        <span className="step-no">STEP {current + 1}</span> / {total}
      </div>
    </div>
  );
}

/* ---------------- 표지 ---------------- */
function CoverScreen({ student, setStudent, onNext }) {
  const valid = student.classNum.trim() !== "" && student.number.trim() !== "" && student.name.trim().length >= 2;
  return (
    <div className="cover-card">
      <span className="section-tag">학생 정보 입력</span>
      <div className="cover-title">온라인 학습지</div>
      <div className="cover-sub">아래 정보를 입력한 뒤 학습지를 시작하세요. 답안은 직접 타이핑해야 하며 복사/붙여넣기는 지원되지 않습니다.</div>
      <div className="cover-grid">
        <div className="field-box"><label>학년</label><div className="fixed-box">1학년</div></div>
        <div className="field-box">
          <label>반</label>
          <input value={student.classNum} onPaste={noPaste}
            onChange={(e) => setStudent((s) => ({ ...s, classNum: e.target.value.replace(/[^0-9]/g, "") }))}
            placeholder="예: 3" />
        </div>
        <div className="field-box">
          <label>번호</label>
          <input value={student.number} onPaste={noPaste}
            onChange={(e) => setStudent((s) => ({ ...s, number: e.target.value.replace(/[^0-9]/g, "") }))}
            placeholder="예: 12" />
        </div>
        <div className="field-box" style={{ gridColumn: "1 / -1" }}>
          <label>이름</label>
          <input value={student.name} onPaste={noPaste}
            onChange={(e) => setStudent((s) => ({ ...s, name: e.target.value }))}
            placeholder="이름을 입력하세요" />
        </div>
      </div>
      <div className="btn-row">
        <button className="btn btn-primary" disabled={!valid} onClick={onNext}>학습지 시작하기 →</button>
      </div>
    </div>
  );
}

/* ---------------- 문항 화면 ---------------- */
function FieldScreen({ step, answers, setAnswers }) {
  return (
    <div>
      <span className="section-tag">ACT.{step.no} · {step.badge}</span>
      <h2 className="section-title">{step.title}</h2>
      {step.fields.map((f) => {
        const val = answers[f.key] || "";
        const ok = isAnswerField(f) ? checkAnswer(f, val) && val.trim().length > 0 : val.trim().length >= f.minLength;
        return (
          <div className="q-block" key={f.key}>
            <div className="q-prompt">
              <span>{f.label}</span>
              {val.length > 0 && (
                <span className={`q-status ${ok ? "ok" : ""}`}>
                  {isAnswerField(f) ? (ok ? "정답입니다" : "정답이 아니에요") : (ok ? "작성 완료" : `최소 ${f.minLength}자`)}
                </span>
              )}
            </div>
            <div className="answer-wrap">
              {f.type === "textarea" ? (
                <textarea className="answer-textarea" rows={4} value={val} placeholder={f.placeholder}
                  onPaste={noPaste} onChange={(e) => setAnswers((a) => ({ ...a, [f.key]: e.target.value }))} />
              ) : (
                <input className="answer-input" value={val} placeholder={f.placeholder}
                  onPaste={noPaste} onChange={(e) => setAnswers((a) => ({ ...a, [f.key]: e.target.value }))} />
              )}
              {!isAnswerField(f) && <div className={`char-count ${ok ? "ok" : ""}`}>{val.trim().length} / 최소 {f.minLength}자</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ---------------- 검토 화면 ---------------- */
function ReviewScreen({ student, answers }) {
  return (
    <div>
      <span className="section-tag">최종 확인</span>
      <h2 className="section-title">전체 답안 검토</h2>
      <div className="review-section">
        <div className="review-section-title">학생 정보</div>
        <div className="review-item"><span className="rk">학년/반/번호/이름 : </span><span className="rv">1학년 {student.classNum}반 {student.number}번 {student.name}</span></div>
      </div>
      <div className="review-section">
        <div className="review-section-title">답안</div>
        {FIELD_ORDER.map((k) => (
          <div className="review-item" key={k}>
            <span className="rk">{FIELD_LABELS[k]} : </span>
            <span className="rv">{answers[k] || <em style={{ color: "var(--danger)" }}>미입력</em>}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------------- 완료 화면 ---------------- */
function DoneScreen({ student }) {
  return (
    <div className="done-wrap">
      <div className="done-badge">✓</div>
      <h2 className="serif" style={{ color: "var(--indigo-900)" }}>제출 완료</h2>
      <p style={{ color: "var(--ink-soft)", fontSize: 14 }}>
        {student.name} 학생의 학습지가 정상적으로 제출되었습니다.<br />이 창은 이제 닫으셔도 됩니다.
      </p>
    </div>
  );
}

/* ---------------- 메인 ---------------- */
function App() {
  const urlParams = new URLSearchParams(window.location.search);
  const prefillName = urlParams.get("name") || "";
  const prefillClass = urlParams.get("classNum") || "";
  const prefillNumber = urlParams.get("number") || "";
  const hasFullInfo = prefillName && prefillClass && prefillNumber;

  const [stepIndex, setStepIndex] = useState(hasFullInfo ? 1 : 0);
  const [student, setStudent] = useState({ classNum: prefillClass, number: prefillNumber, name: prefillName });
  const [answers, setAnswers] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitErr, setSubmitErr] = useState("");

  const step = STEPS[stepIndex];
  const fieldSteps = STEPS.filter((s) => s.kind === "field");

  const currentStepValid = useMemo(() => {
    if (step.kind !== "field") return true;
    return step.fields.every((f) => {
      const val = answers[f.key] || "";
      if (isAnswerField(f)) return checkAnswer(f, val) && val.trim().length > 0;
      return val.trim().length >= f.minLength;
    });
  }, [step, answers]);

  const goNext = () => setStepIndex((i) => Math.min(i + 1, STEPS.length - 1));
  const goPrev = () => setStepIndex((i) => Math.max(i - 1, 0));

  const submit = async () => {
    setSubmitting(true);
    setSubmitErr("");
    const payload = {
      version: VERSION, grade: "1학년", classNum: student.classNum, number: student.number, name: student.name,
      ...answers, submittedAt: new Date().toLocaleString("ko-KR"),
    };
    try {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "저장 실패");
      goNext();
    } catch (e) {
      setSubmitErr("제출 중 문제가 발생했어요. 다시 시도해주세요. (" + (e.message || e) + ")");
    }
    setSubmitting(false);
  };

  const fieldStepPos = fieldSteps.indexOf(step);

  return (
    <div className="app-root">
      <div className="doc-shell">
        <div className="doc-header">
          <div>
            <div className="doc-no">문서번호 {DOC_NO}</div>
            <div className="unit-path">{UNIT_PATH}</div>
            <div className="unit-title">{UNIT_TITLE}</div>
          </div>
          <div className="seal"><span>정보</span><span className="seal-code">{UNIT_CODE}</span></div>
        </div>

        {step.kind === "field" && <Stepper current={fieldStepPos} total={fieldSteps.length} />}

        <div className={`doc-card ${step.kind !== "field" ? "last" : ""}`}>
          {step.kind === "cover" && <CoverScreen student={student} setStudent={setStudent} onNext={goNext} />}
          {step.kind === "field" && (
            <>
              <FieldScreen step={step} answers={answers} setAnswers={setAnswers} />
              <div className="btn-row">
                <button className="btn btn-ghost" onClick={goPrev}>← 이전</button>
                <button className="btn btn-primary" disabled={!currentStepValid} onClick={goNext}>
                  {fieldStepPos === fieldSteps.length - 1 ? "검토하기 →" : "다음 →"}
                </button>
              </div>
            </>
          )}
          {step.kind === "review" && (
            <>
              <ReviewScreen student={student} answers={answers} />
              {submitErr && <p style={{ color: "var(--danger)", fontSize: 13 }}>{submitErr}</p>}
              <div className="btn-row">
                <button className="btn btn-ghost" onClick={goPrev}>← 수정하러 가기</button>
                <button className="btn btn-primary" disabled={submitting} onClick={submit}>{submitting ? "제출 중..." : "제출하기"}</button>
              </div>
            </>
          )}
          {step.kind === "done" && <DoneScreen student={student} />}
        </div>

        {step.kind !== "done" && step.kind !== "review" && (
          <div className="footer-note">{UNIT_PATH} · {UNIT_TITLE}</div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// 우클릭 메뉴 및 개발자도구 단축키 방지 (완전 차단은 아니며, 가벼운 방해 장치 수준)
document.addEventListener("contextmenu", (e) => e.preventDefault());
document.addEventListener("keydown", (e) => {
  const key = e.key.toUpperCase();
  const blocked = key === "F12" || (e.ctrlKey && e.shiftKey && (key === "I" || key === "J" || key === "C")) || (e.ctrlKey && key === "U");
  if (blocked) e.preventDefault();
});
</script>
</body>
</html>
